<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
}

.card{
    width:360px;
    padding:40px;
    border-radius:20px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    color:white;
    text-align:center;
}

h1{
    margin-bottom:10px;
}

.subtitle{
    opacity:.8;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin:10px 0;
    outline:none;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:white;
    color:#4f46e5;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

#landing{
    display:none;
}

.welcome{
    font-size:34px;
    margin:25px 0;
    color:green;
}

.small{
    opacity:.85;
    margin-bottom:30px;
}

#overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    justify-content:center;
    align-items:center;
}

.popup{
    width:260px;
    padding:25px;
    border-radius:15px;
    background:#2563eb;
    color:white;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
}

.popup p{
    margin-bottom:20px;
}

.popup button{
    color:#2563eb;
}
</style>

</head>
<body>

<div class="card" id="login">

<h1>👋 Welcome</h1>
<p class="subtitle">Sign in to continue</p>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<div class="card" id="landing">

<h1>✅ Success!</h1>

<div class="welcome">
Welcome <span id="name">Selva</span>
</div>

<p class="small">
Glad to see you again.
</p>

<button onclick="getStarted()">
🚀 Get Started
</button>

</div>

<div id="overlay">
<div class="popup">
<p>Let's build something awesome 🚀</p>
<button onclick="closePopup()">
Close
</button>
</div>
</div>

<script src="app.js"></script>

</body>
</html>
